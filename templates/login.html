<!DOCTYPE html>
<html>
<head>
    <title>Student Login</title>

    <style>
        body{
            font-family: Arial;
            background:#eef2f7;
        }

        .box{
            width:350px;
            margin:120px auto;
            padding:30px;
            background:white;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        input{
            width:100%;
            padding:10px;
            margin:10px 0;
        }

        button{
            width:100%;
            padding:10px;
            background:#007bff;
            color:white;
            border:none;
        }

        .error{
            color:red;
        }
    </style>
</head>

<body>

<div class="box">

<h2>Student Login</h2>

{% if error %}
<p class="error">{{error}}</p>
{% endif %}

<form method="POST">

<input type="email" name="email"
placeholder="Email" required>

<input type="password" name="password"
placeholder="Password" required>

<button type="submit">Login</button>

</form>

<br>
<a href="/register">Register</a>

</div>

</body>
</html>
