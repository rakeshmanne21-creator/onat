<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>

<style>
body{
font-family:Arial;
background:#eef2f7;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,0.15);
width:320px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
width:100%;
padding:10px;
background:#2c7be5;
color:white;
border:none;
}

a{
text-decoration:none;
color:#6c2bd9;
}
</style>

</head>

<body>

<div class="box">

<h2>Admin Login</h2>

<form method="POST">

<input name="username"
placeholder="Username" required>

<input type="password"
name="password"
placeholder="Password" required>

<button type="submit">Login</button>

</form>

<br>

<a href="/admin_register">
Create Admin Account
</a>

<br><br>

<a href="/">⬅ Back</a>

</div>

</body>
</html>
